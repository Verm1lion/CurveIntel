name: Bug Report
description: Report a bug or incorrect calculation
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Upload CSV file '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include error messages/tracebacks)

  - type: input
    id: version
    attributes:
      label: CurveIntel Version
      placeholder: "2.0.0"

  - type: dropdown
    id: vendor
    attributes:
      label: Test Machine Vendor
      options:
        - ZwickRoell
        - Instron
        - Shimadzu
        - MTS
        - Tinius Olsen
        - DEVOTRANS
        - Hegewald & Peschke
        - NIST
        - Other / Generic CSV

  - type: textarea
    id: csv
    attributes:
      label: Sample CSV (first 10 rows)
      description: Paste the first 10 rows of the CSV that triggers the bug (anonymize if needed)
      render: csv
