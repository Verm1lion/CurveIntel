name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests
        run: |
          pytest --cov=src --cov-report=xml --cov-report=term-missing -v

  postgres-smoke:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: curveintel
          POSTGRES_USER: curveintel
          POSTGRES_PASSWORD: curveintel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U curveintel -d curveintel"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CURVEINTEL_TEST_DATABASE_URL: postgresql+psycopg2://curveintel:curveintel@localhost:5432/curveintel
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run PostgreSQL smoke test
        run: |
          pytest -q tests/test_postgres_smoke.py

  docker:
    runs-on: ubuntu-latest
    needs: [test, postgres-smoke]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t curveintel:test .

      - name: Test Docker container
        run: |
          docker run -d -p 8000:8000 --name ci-test curveintel:test
          sleep 5
          curl -f http://localhost:8000/api/health || exit 1
          docker stop ci-test
